<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViViDSi</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .container {
            /* Сделано более прозрачным (было 0.85, стало 0.4) */
            background: rgba(0, 0, 0, 0.4);
            /* Добавлено легкое размытие подложки, чтобы текст читался на любом фоне */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            /* Убрано position: relative, чтобы не конфликтовать со стрелкой */
            display: none; 
        }
        h1 { margin-top: 0; font-size: 22px; line-height: 1.4; margin-bottom: 20px; }
        
        /* СТРЕЛКА: Вынесена из блока и привязана к экрану */
        .arrow { 
            position: fixed; 
            top: 15px; 
            right: 20px; 
            font-size: 3.5em; 
            z-index: 9999; /* Всегда поверх всего */
            text-shadow: 0 2px 10px rgba(0,0,0,0.7); /* Тень, чтобы не сливалась с фоном */
            animation: arrowMove 1s infinite alternate; 
            display: none; /* Скрыта по умолчанию */
        }
        @keyframes arrowMove { 0% { transform: translateY(0); } 100% { transform: translateY(-15px); } }
        
        .steps { margin: 20px 0; text-align: left; padding: 0 10px; }
        .steps p { margin: 15px 0; font-size: 16px; line-height: 1.4; }
        .steps p:nth-child(2) { font-weight: bold; color: #4ade80; animation: textZoom 1s infinite alternate; }
        @keyframes textZoom { 0% { transform: scale(1); } 100% { transform: scale(1.02); } }
        .loader { border: 5px solid rgba(255, 255, 255, 0.1); border-left-color: #f59e0b; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        .redirect-text { font-size: 18px; font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Стрелка теперь вынесена за пределы контейнера, чтобы позиционироваться по экрану -->
    <div class="arrow" id="arrowIcon">⬆️</div>

    <div id="in-app-view" class="container">
        <h1 id="mainText">To chat with me, open your browser 💋</h1>
        <div class="steps">
            <p id="step1">1. Click the three dots in the top right corner</p>
            <p id="step2">2. Tap "Open in browser" from the menu that opens</p>
        </div>
    </div>
    <div id="browser-view" class="container" style="background: rgba(0,0,0,0.6); display: none;">
        <div class="loader"></div>
        <div class="redirect-text" id="redirectText">Loading...</div>
    </div>

    <script>
        const LINK_GERMANY  = "https://www.fanvue.com/vivid_fantasies"; 
        const LINK_EU_GROUP = "https://www.fanvue.com/vivid_fantasies"; 
        const LINK_DEFAULT  = "https://www.fanvue.com/vivid_fantasies";
        const OFFER_LINKS = {
            'default': LINK_DEFAULT,
            'de': LINK_GERMANY,
            'pl': LINK_EU_GROUP, 'lv': LINK_EU_GROUP, 'lt': LINK_EU_GROUP, 
            'et': LINK_EU_GROUP, 'ee': LINK_EU_GROUP, 'ro': LINK_EU_GROUP, 
            'hu': LINK_EU_GROUP, 'be': LINK_EU_GROUP, 'no': LINK_EU_GROUP, 
            'nb': LINK_EU_GROUP, 'nn': LINK_EU_GROUP, 'da': LINK_EU_GROUP, 
            'dk': LINK_EU_GROUP, 'sv': LINK_EU_GROUP, 'se': LINK_EU_GROUP, 
            'sw': LINK_EU_GROUP, 'sl': LINK_EU_GROUP, 'sk': LINK_EU_GROUP, 
            'el': LINK_EU_GROUP, 'gr': LINK_EU_GROUP, 'lb': LINK_EU_GROUP, 
            'lu': LINK_EU_GROUP, 'bs': LINK_EU_GROUP, 'ba': LINK_EU_GROUP, 
            'bg': LINK_EU_GROUP, 'ga': LINK_EU_GROUP, 'ie': LINK_EU_GROUP, 
            'sq': LINK_EU_GROUP, 'al': LINK_EU_GROUP, 'hr': LINK_EU_GROUP, 
            'mk': LINK_EU_GROUP, 'me': LINK_EU_GROUP, 'cnr': LINK_EU_GROUP
        };
        function isInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || 
                   (ua.indexOf("Instagram") > -1) || (ua.indexOf("TikTok") > -1) || 
                   (ua.indexOf("Snapchat") > -1) || (ua.indexOf("Line") > -1) || 
                   (ua.indexOf("wv") > -1);
        }
        function setLanguageText() {
            var userLang = navigator.language || navigator.userLanguage;
            if (userLang.startsWith("ru")) {
                document.getElementById("mainText").innerText = "Чтобы написать мне, открой браузер 💋";
                document.getElementById("step1").innerText = "1. Нажмите на три точки в правом верхнем углу";
                document.getElementById("step2").innerText = "2. Выберите «Открыть в браузере» в открывшемся меню";
            } else if (userLang.startsWith("es")) {
                document.getElementById("mainText").innerText = "Abre el navegador para chatear conmigo 💋";
                document.getElementById("step1").innerText = "1. Haga clic en los tres puntos en la esquina superior derecha";
                document.getElementById("step2").innerText = "2. Toque \"Abrir en el navegador\" en el menú que se abre";
            } else if (userLang.startsWith("zh")) {
                document.getElementById("mainText").innerText = "请在浏览器中打开以与我聊天 💋";
                document.getElementById("step1").innerText = "1. 点击右上角的三个点";
                document.getElementById("step2").innerText = "2. 从打开的菜单中选择“在浏览器中打开”";
            } else if (userLang.startsWith("fr")) {
                document.getElementById("mainText").innerText = "Ouvre le navigateur pour me contacter 💋";
                document.getElementById("step1").innerText = "1. Cliquez sur les trois points en haut à droite";
                document.getElementById("step2").innerText = "2. Appuyez sur \"Ouvrir dans le navigateur\" dans le menu qui s'ouvre";
            } else if (userLang.startsWith("de")) {
                document.getElementById("mainText").innerText = "Öffne den Browser, um mir zu schreiben 💋";
                document.getElementById("step1").innerText = "1. Klicken Sie auf die drei Punkte in der oberen rechten Ecke";
                document.getElementById("step2").innerText = "2. Tippen Sie im geöffneten Menü auf \"Im Browser öffnen\"";
            } else if (userLang.startsWith("hr")) {
                document.getElementById("mainText").innerText = "Otvori preglednik da mi napišeš 💋";
                document.getElementById("step1").innerText = "1. Kliknite na tri točke u gornjem desnom kutu";
                document.getElementById("step2").innerText = "2. U izborniku koji se otvori odaberite \"Otvori u pregledniku\"";
            } else if (userLang.startsWith("hu")) {
                document.getElementById("mainText").innerText = "Nyisd meg a böngészőt, hogy írj nekem 💋";
                document.getElementById("step1").innerText = "1. Kattintson a jobb felső sarokban található három pontra";
                document.getElementById("step2").innerText = "2. A megnyíló menüben kattintson a \"Megnyitás a böngészőben\" lehetőségre";
            } else if (userLang.startsWith("it")) {
                document.getElementById("mainText").innerText = "Apri il browser per scrivermi 💋";
                document.getElementById("step1").innerText = "1. Fai clic sui tre punti in alto a destra";
                document.getElementById("step2").innerText = "2. Tocca \"Apri nel browser\" nel menu che si apre";
            } else if (userLang.startsWith("cs")) {
                document.getElementById("mainText").innerText = "Otevři prohlížeč a napiš mi 💋";
                document.getElementById("step1").innerText = "1. Klikněte na tři tečky v pravém horním rohu";
                document.getElementById("step2").innerText = "2. V otevřeném menu klikněte na \"Otevřít v prohlížeči\"";
            } else if (userLang.startsWith("sk")) {
                document.getElementById("mainText").innerText = "Otvor prehliadač a napíš mi 💋";
                document.getElementById("step1").innerText = "1. Kliknite na tri bodky v pravom hornom rohu";
                document.getElementById("step2").innerText = "2. V otvorenom menu kliknite na \"Otvoriť v prehliadači\"";
            } else if (userLang.startsWith("fi")) {
                document.getElementById("mainText").innerText = "Avaa selain kirjoittaaksesi minulle 💋";
                document.getElementById("step1").innerText = "1. Napsauta kolmea pistettä oikeassa yläkulmassa";
                document.getElementById("step2").innerText = "2. Valitse avautuvasta valikosta \"Avaa selaimessa\"";
            } else if (userLang.startsWith("el")) {
                document.getElementById("mainText").innerText = "Άνοιξε τον περιηγητή για να μου γράψεις 💋";
                document.getElementById("step1").innerText = "1. Κάντε κλικ στις τρεις τελείες στην επάνω δεξιά γωνία";
                document.getElementById("step2").innerText = "2. Πατήστε \"Άνοιγμα στο πρόγραμμα περιήγησης\" από το μενού που ανοίγει";
            } else if (userLang.startsWith("uk")) {
                document.getElementById("mainText").innerText = "Щоб написати мені, відкрий браузер 💋";
                document.getElementById("step1").innerText = "1. Натисніть на три точки у верхньому правньому куті";
                document.getElementById("step2").innerText = "2. Виберіть «Відкрити в браузері» у відкритому меню";
            } else if (userLang.startsWith("no")) {
                document.getElementById("mainText").innerText = "Åpne nettleseren for å chatte med meg 💋";
                document.getElementById("step1").innerText = "1. Klikk på de tre prikkene i øverste høyre hjørne";
                document.getElementById("step2").innerText = "2. Trykk på \"Åpne i nettleser\" fra menyen som åpnes";
            } else if (userLang.startsWith("et")) {
                document.getElementById("mainText").innerText = "Ava brauser, et mulle kirjutada 💋";
                document.getElementById("step1").innerText = "1. Klõpsake paremas ülanurgas kolme punkti";
                document.getElementById("step2").innerText = "2. Avanenud menüüst valige \"Ava brauseris\"";
            } else if (userLang.startsWith("pl")) {
                document.getElementById("mainText").innerText = "Otwórz przeglądarkę, żeby do mnie napisać 💋";
                document.getElementById("step1").innerText = "1. Kliknij trzy kropki w prawym górnym rogu";
                document.getElementById("step2").innerText = "2. Wybierz \"Otwórz w przeglądarce\" z otwartego menu";
            } else if (userLang.startsWith("tr")) {
                document.getElementById("mainText").innerText = "Benimle sohbet etmek için tarayıcını aç 💋";
                document.getElementById("step1").innerText = "1. Sağ üst köşedeki üç noktaya tıklayın";
                document.getElementById("step2").innerText = "2. Açılan menüden \"Tarayıcıda aç\" öğesine dokunun";
            } else if (userLang.startsWith("bg")) {
                document.getElementById("mainText").innerText = "Отвори браузъра, за да ми пишеш 💋";
                document.getElementById("step1").innerText = "1. Щракнете върху трите точки в горния десен ъгъл";
                document.getElementById("step2").innerText = "2. Изберете \"Отвори в браузъра\" от менюто, което се отваря";
            } else if (userLang.startsWith("ja")) {
                document.getElementById("mainText").innerText = "私とチャットするにはブラウザを開いてください 💋";
                document.getElementById("step1").innerText = "1. 右上の3点をクリック";
                document.getElementById("step2").innerText = "2. 開いたメニューから「ブラウザで開く」を選択";
            } else if (userLang.startsWith("ko")) {
                document.getElementById("mainText").innerText = "저와 채팅하려면 브라우저를 열어주세요 💋";
                document.getElementById("step1").innerText = "1. 오른쪽 상단의 세 점을 클릭하세요";
                document.getElementById("step2").innerText = "2. 열린 메뉴에서 \"브라우저에서 열기\"를 선택하세요";
            } else if (userLang.startsWith("sr")) {
                document.getElementById("mainText").innerText = "Отвори претраживач да ми пишеш 💋";
                document.getElementById("step1").innerText = "1. Кликните на три тачке у горњем десном углу";
                document.getElementById("step2").innerText = "2. Изаберите „Отвори у претраживачу“ из менија који се отвори";
            }
        }
        window.onload = function() {
            setLanguageText();
            const inAppView = document.getElementById('in-app-view');
            const arrowIcon = document.getElementById('arrowIcon');
            
            if (isInAppBrowser()) {
                inAppView.style.display = 'block';
                arrowIcon.style.display = 'block'; // Показываем стрелку
            } else {
                const rawLang = (navigator.language || navigator.userLanguage || 'en').substr(0, 2).toLowerCase();
                const targetLink = OFFER_LINKS[rawLang] || OFFER_LINKS['default'];
                window.location.replace(targetLink);
            }
        };
    </script>
</body>
</html>
